<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Time Tracker</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f5f5f5;
}

.container{
background:white;
width:400px;
margin:auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

.userBox{
background:#eeeeee;
padding:10px;
margin:10px;
border-radius:8px;
}

button{
padding:8px;
margin:5px;
cursor:pointer;
}

input{
padding:8px;
margin:5px;
}

</style>

</head>

<body>

<h1>Smart Time Tracker</h1>

<div class="container">

<h2>Add User</h2>

<input type="text" id="username" placeholder="Enter user name">
<button onclick="addUser()">Add User</button>

<div id="userList"></div>

<hr>

<h2>Stopwatch</h2>

<h2 id="stopwatch">00:00:00</h2>

<button onclick="startStopwatch()">Start</button>
<button onclick="stopStopwatch()">Stop</button>
<button onclick="resetStopwatch()">Reset</button>

</div>

<script src="script.js"></script>

</body>
</html>
