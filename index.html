<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stopwatch and Timer App</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f5f5f5;
}

.container{
background:white;
width:450px;
margin:auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

.userBox{
background:#eeeeee;
padding:10px;
margin:10px;
border-radius:8px;
}

button{
padding:8px;
margin:5px;
cursor:pointer;
}

input{
padding:8px;
margin:5px;
}

</style>

</head>

<body>

<h1>Stopwatch and Timer</h1>

<div class="container">

<!-- TIMER (Independent) -->

<h2>Timer</h2>

<input type="number" id="timerMinutes" placeholder="Enter minutes">

<h2 id="timerDisplay">00:00</h2>

<button onclick="startTimer()">Start Timer</button>
<button onclick="deleteTimer()">Delete Timer</button>

<hr>

<!-- ADD USER -->

<h2>Add User Stopwatch</h2>

<input type="text" id="username" placeholder="Enter user name">
<button onclick="addUser()">Add User</button>

<div id="userList"></div>

</div>

<script src="script.js"></script>

</body>
</html>
